# ============================================================
#  Smartrack — Mosquitto MQTT Broker Config
# ============================================================

# ─── TCP Listener (perangkat IoT) ───────────────────────────
listener 1883
protocol mqtt

# ─── WebSocket Listener (browser client) ────────────────────
listener 9000
protocol websockets

# ─── Autentikasi ────────────────────────────────────────────
# Untuk production aman, set allow_anonymous false
# dan aktifkan password_file di bawah.
allow_anonymous true
# password_file /mosquitto/config/password.txt
# acl_file /mosquitto/config/acl.txt

# ─── Logging ─────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# ─── Persistence ─────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800

# ─── Limits ──────────────────────────────────────────────────
max_packet_size    268435456   # 256 MB
max_inflight_messages 50
max_queued_messages   200
max_connections    -1

# ─── QoS ─────────────────────────────────────────────────────
upgrade_outgoing_qos false
retain_available true
